<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aquarium Management System</title>
    <meta name="description" content="Secure login for the modern Aquarium Management System.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ocean-bg">
        <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=2670&auto=format&fit=crop" alt="Underwater Background" class="login-bg-image">
        <div class="bubbles" id="bubbles-container"></div>
    </div>

    <main class="login-container">
        <div class="login-card glass" id="login-card">
            <div class="login-header">
                <h1>Smart Aquarium</h1>
                <p>Enter your credentials to dive in</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" id="login-btn">
                    <span id="btn-text">Sign In</span>
                    <div class="loader" id="btn-loader"></div>
                </button>

                <p id="error-message">Invalid email or password. Please try again.</p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
